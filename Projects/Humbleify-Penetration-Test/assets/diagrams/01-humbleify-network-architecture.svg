<text x="130" y="340" class="body">External testing host used for</text>
<text x="130" y="365" class="body">reconnaissance, enumeration, and</text>
<text x="130" y="390" class="body">controlled validation activities.</text>
<rect x="130" y="415" rx="14" ry="14" width="160" height="34" fill="#e2e8f0"/>

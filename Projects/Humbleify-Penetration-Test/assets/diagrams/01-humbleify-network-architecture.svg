<rect x="650" y="585" rx="18" ry="18" width="110" height="36" fill="#e2e8f0"/><text x="688" y="608" class="chip">21/FTP</text>
<rect x="775" y="585" rx="18" ry="18" width="118" height="36" fill="#e2e8f0"/><text x="811" y="608" class="chip">22/SSH</text>
<rect x="908" y="585" rx="18" ry="18" width="124" height="36" fill="#e2e8f0"/><text x="945" y="608" class="chip">80/HTTP</text>
<rect x="1047" y="585" rx="18" ry="18" width="126" height="36" fill="#e2e8f0"/><text x="1074" y="608" class="chip">3306/MySQL</text>
<rect x="1188" y="585" rx="18" ry="18" width="126" height="36" fill="#e2e8f0"/><text x="1215" y="608" class="chip">6667/IRC</text>

<rect x="1285" y="225" rx="28" ry="28" width="255" height="305" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
<text x="1315" y="275" class="label">What this diagram shows</text>
<text x="1320" y="318" class="body">• One exposed host with multiple</text>
<text x="1320" y="346" class="body">  reachable services</text>
<text x="1320" y="384" class="body">• Why outdated software, weak</text>
<text x="1320" y="412" class="body">  credentials, and broad data access</text>
<text x="1320" y="440" class="body">  combined into meaningful risk</text>
<text x="1320" y="478" class="body">• Why service reduction and access</text>
<text x="1320" y="506" class="body">  segmentation mattered</text>

<rect x="80" y="760" rx="22" ry="22" width="1440" height="86" fill="#0f172a"/>
<text x="120" y="807" style="font:700 18px 'DejaVu Sans', Arial, sans-serif; fill:#ffffff;">Portfolio note:</text>
<text x="255" y="807" style="font:400 17px 'DejaVu Sans', Arial, sans-serif; fill:#e2e8f0;">This visual is intentionally simplified for public GitHub use and avoids publishing harmful exploit detail or sensitive evidence.</text>

<text x="680" y="365" class="body">Apache HTTP service</text>
<text x="680" y="390" class="body">WebDAV-enabled upload path</text>

<rect x="930" y="295" rx="22" ry="22" width="275" height="110" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>

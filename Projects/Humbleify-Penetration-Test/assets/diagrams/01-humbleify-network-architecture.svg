<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
    <path d="M0,0 L14,7 L0,14 z" fill="#2563eb"/>
  </marker>
</defs>
<line x1="370" y1="355" x2="600" y2="355" stroke="#2563eb" stroke-width="6" marker-end="url(#arrow)"/>
<text x="410" y="322" class="callout">Scoped assessment traffic</text>

<rect x="610" y="170" rx="34" ry="34" width="640" height="500" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
<text x="650" y="225" class="label">Humbleify Duplicate Lab Host</text>
<text x="650" y="255" class="small">Ubuntu 14.04 / Linux 3.13 target described in the report</text>

<rect x="650" y="295" rx="22" ry="22" width="255" height="110" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>

<text x="680" y="505" class="body">MySQL-backed employee and</text>
<text x="680" y="530" class="body">customer information store</text>

<rect x="930" y="435" rx="22" ry="22" width="275" height="120" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>

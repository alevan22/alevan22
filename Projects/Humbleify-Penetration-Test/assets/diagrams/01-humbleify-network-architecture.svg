<text x="960" y="365" class="body">OpenSSH / ProFTPD</text>
<text x="960" y="390" class="body">User access boundary</text>

<rect x="650" y="435" rx="22" ry="22" width="255" height="120" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>

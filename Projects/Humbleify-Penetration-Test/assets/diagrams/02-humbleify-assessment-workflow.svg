<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#f8fafc"/>

<style>
    .title { font: 700 30px 'DejaVu Sans', Arial, sans-serif; fill:#0f172a; }
    .subtitle { font: 400 15px 'DejaVu Sans', Arial, sans-serif; fill:#475569; }
    .label { font: 700 18px 'DejaVu Sans', Arial, sans-serif; fill:#0f172a; }
    .body { font: 400 15px 'DejaVu Sans', Arial, sans-serif; fill:#334155; }
    .small { font: 400 13px 'DejaVu Sans', Arial, sans-serif; fill:#475569; }
    .chip { font: 700 13px 'DejaVu Sans', Arial, sans-serif; fill:#0f172a; }
    .callout { font: 700 15px 'DejaVu Sans', Arial, sans-serif; fill:#1e293b; }
</style>

<defs>
  <marker id="arrow2" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
    <path d="M0,0 L14,7 L0,14 z" fill="#2563eb"/>
  </marker>
</defs>
<text x="80" y="88" class="title">Humbleify Assessment Workflow</text>
<text x="80" y="118" class="subtitle">Sanitized workflow showing how the engagement moved from discovery to risk communication.</text>
<rect x="90" y="230" rx="26" ry="26" width="220" height="160" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/><text x="114" y="275" class="label">1. Reconnaissance</text><text x="114" y="312" class="body">Start from the provided</text><text x="114" y="338" class="body">IP address and identify</text><text x="114" y="364" class="body">reachable services.</text><rect x="355" y="230" rx="26" ry="26" width="220" height="160" fill="#eff6ff" stroke="#bfdbfe" stroke-width="3"/><text x="379" y="275" class="label">2. Enumeration</text><text x="379" y="312" class="body">Validate versions,</text><text x="379" y="338" class="body">exposed paths, and</text><text x="379" y="364" class="body">service-specific clues.</text><rect x="620" y="230" rx="26" ry="26" width="220" height="160" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/><text x="644" y="275" class="label">3. Access Validation</text><text x="644" y="312" class="body">Assess weak credentials</text><text x="644" y="338" class="body">and misconfigurations</text><text x="644" y="364" class="body">that enable footholds.</text><rect x="885" y="230" rx="26" ry="26" width="220" height="160" fill="#eff6ff" stroke="#bfdbfe" stroke-width="3"/><text x="909" y="275" class="label">4. Privilege Review</text><text x="909" y="312" class="body">Check whether limited</text><text x="909" y="338" class="body">access can escalate into</text><text x="909" y="364" class="body">deeper host control.</text><rect x="1150" y="230" rx="26" ry="26" width="220" height="160" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/><text x="1174" y="275" class="label">5. Data Exposure</text><text x="1174" y="312" class="body">Review what employee</text><text x="1174" y="338" class="body">and customer information</text><text x="1174" y="364" class="body">becomes reachable.</text><line x1="310" y1="310" x2="355" y2="310" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow2)"/><line x1="575" y1="310" x2="620" y2="310" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow2)"/><line x1="840" y1="310" x2="885" y2="310" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow2)"/><line x1="1105" y1="310" x2="1150" y2="310" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow2)"/><line x1="505" y1="390" x2="505" y2="455" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow2)"/><line x1="1260" y1="390" x2="1260" y2="455" stroke="#2563eb" stroke-width="5"/><line x1="1260" y1="455" x2="915" y2="455" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow2)"/><rect x="355" y="500" rx="28" ry="28" width="300" height="170" fill="#ecfeff" stroke="#a5f3fc" stroke-width="3"/><text x="381" y="550" class="label">6. Risk Synthesis</text><text x="381" y="592" class="body">Connect the issues into a realistic</text><text x="381" y="620" class="body">attack path rather than treating</text><text x="381" y="648" class="body">each weakness in isolation.</text><rect x="765" y="500" rx="28" ry="28" width="300" height="170" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/><text x="791" y="550" class="label">7. Remediation Planning</text><text x="791" y="592" class="body">Translate findings into hardening</text><text x="791" y="620" class="body">priorities across credentials,</text><text x="791" y="648" class="body">service exposure, and data access.</text><line x1="655" y1="585" x2="765" y2="585" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow2)"/><rect x="80" y="690" rx="22" ry="22" width="1440" height="62" fill="#0f172a"/><text x="115" y="730" style="font:700 18px 'DejaVu Sans', Arial, sans-serif; fill:#ffffff;">Why this workflow matters:</text><text x="390" y="730" style="font:400 16px 'DejaVu Sans', Arial, sans-serif; fill:#e2e8f0;">It shows structured methodology, connects offensive validation to defensive action, and creates a strong interview narrative.</text><rect x="80" y="770" rx="22" ry="22" width="1440" height="76" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/><text x="120" y="815" class="callout">Public GitHub version:</text><text x="290" y="815" class="body">The workflow preserves the methodology and risk narrative while omitting sensitive evidence and exact reproduction detail.</text></svg>